<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyrim MCP — Project Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
  h1 { color: #c9a84c; margin-bottom: 5px; font-size: 28px; }
  .subtitle { color: #888; margin-bottom: 20px; font-size: 14px; }
  .summary { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
  .stat { background: #16213e; border-radius: 8px; padding: 15px 20px; min-width: 130px; text-align: center; border: 1px solid #1a1a40; }
  .stat .number { font-size: 32px; font-weight: bold; }
  .stat .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .stat.complete .number { color: #4ecca3; }
  .stat.untested .number { color: #e8b84b; }
  .stat.planned .number { color: #7b8cde; }
  .stat.bugs .number { color: #e74c3c; }
  .stat.total .number { color: #fff; }
  .filters { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .filters label { color: #888; font-size: 13px; }
  .filters select, .filters input { background: #16213e; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; padding: 6px 10px; font-size: 13px; }
  .phase { margin-bottom: 20px; background: #16213e; border-radius: 8px; overflow: hidden; border: 1px solid #1a1a40; }
  .phase-header { padding: 12px 18px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; background: #1a1a40; }
  .phase-header:hover { background: #222244; }
  .phase-title { font-size: 16px; font-weight: 600; }
  .phase-title .num { color: #c9a84c; margin-right: 8px; }
  .phase-meta { display: flex; gap: 12px; align-items: center; }
  .phase-priority { font-size: 11px; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .phase-priority.critical { background: #e74c3c33; color: #e74c3c; }
  .phase-priority.high { background: #e8b84b33; color: #e8b84b; }
  .phase-priority.medium { background: #7b8cde33; color: #7b8cde; }
  .phase-priority.low { background: #4ecca333; color: #4ecca3; }
  .phase-progress { font-size: 12px; color: #888; }
  .phase-items { padding: 0; display: none; }
  .phase.open .phase-items { display: block; }
  .item { padding: 10px 18px; border-top: 1px solid #1a1a2e; display: flex; align-items: center; gap: 12px; cursor: pointer; }
  .item:hover { background: #1a1a40; }
  .item-status { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .item-status.complete { background: #4ecca3; }
  .item-status.implemented-untested { background: #e8b84b; }
  .item-status.planned { background: #7b8cde; }
  .item-status.resolved-workaround { background: #4ecca3; border: 2px solid #e8b84b; }
  .item-id { font-family: monospace; font-size: 12px; color: #666; min-width: 75px; }
  .item-type { font-size: 10px; padding: 1px 6px; border-radius: 3px; text-transform: uppercase; min-width: 50px; text-align: center; }
  .item-type.feature { background: #7b8cde33; color: #7b8cde; }
  .item-type.bug { background: #e74c3c33; color: #e74c3c; }
  .item-type.infrastructure { background: #4ecca333; color: #4ecca3; }
  .item-title { flex: 1; font-size: 14px; }
  .item-desc { display: none; padding: 8px 18px 12px 115px; font-size: 12px; color: #999; line-height: 1.5; border-top: 1px solid #1a1a2e; }
  .item.expanded + .item-desc { display: block; }
  .progress-bar { height: 4px; background: #333; border-radius: 2px; overflow: hidden; width: 100px; }
  .progress-fill { height: 100%; background: #4ecca3; border-radius: 2px; }
  .legend { display: flex; gap: 20px; margin-bottom: 20px; font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .discovery { padding: 8px 14px; background: #1a1a40; border-radius: 6px; margin-bottom: 6px; font-size: 13px; border-left: 3px solid #c9a84c; }
  .section-title { color: #c9a84c; font-size: 18px; margin: 25px 0 10px; }
  #file-input { margin-bottom: 15px; }
</style>
</head>
<body>

<h1>Skyrim MCP</h1>
<p class="subtitle">Project Dashboard &mdash; <span id="lastUpdated"></span></p>

<div>
  <label for="file-input" style="color:#888;font-size:13px;">Load project_work_items.json: </label>
  <input type="file" id="file-input" accept=".json">
</div>

<div class="summary" id="summary"></div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#4ecca3"></div> Complete</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e8b84b"></div> Implemented (untested)</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7b8cde"></div> Planned</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div> Bug</div>
</div>

<div class="filters">
  <label>Filter:</label>
  <select id="status-filter"><option value="all">All Statuses</option><option value="complete">Complete</option><option value="implemented-untested">Untested</option><option value="planned">Planned</option></select>
  <select id="type-filter"><option value="all">All Types</option><option value="feature">Features</option><option value="bug">Bugs</option><option value="infrastructure">Infrastructure</option></select>
  <input type="text" id="search" placeholder="Search...">
</div>

<div id="phases"></div>
<h2 class="section-title" id="infra-title" style="display:none">Infrastructure</h2>
<div id="infrastructure"></div>
<h2 class="section-title" id="disc-title" style="display:none">Key Discoveries</h2>
<div id="discoveries"></div>

<script>
let data = null;

document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try { data = JSON.parse(ev.target.result); render(); }
    catch (err) { alert('Invalid JSON'); }
  };
  reader.readAsText(file);
});

fetch('project_work_items.json').then(function(r) { return r.json(); }).then(function(d) { data = d; render(); }).catch(function(){});

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.textContent;
}

function render() {
  if (!data) return;
  document.getElementById('lastUpdated').textContent = data.lastUpdated || 'unknown';

  var counts = { complete: 0, untested: 0, planned: 0, bugs: 0, total: 0 };
  function countItem(item) {
    counts.total++;
    if (item.status === 'complete' || item.status === 'resolved-workaround') counts.complete++;
    else if (item.status === 'implemented-untested') counts.untested++;
    else counts.planned++;
    if (item.type === 'bug') counts.bugs++;
  }
  (data.phases || []).forEach(function(p) { (p.items || []).forEach(countItem); });
  (data.infrastructure || []).forEach(countItem);

  var summaryEl = document.getElementById('summary');
  summaryEl.textContent = '';
  var stats = [
    { cls: 'total', num: counts.total, label: 'Total' },
    { cls: 'complete', num: counts.complete, label: 'Complete' },
    { cls: 'untested', num: counts.untested, label: 'Untested' },
    { cls: 'planned', num: counts.planned, label: 'Planned' },
    { cls: 'bugs', num: counts.bugs, label: 'Bugs' }
  ];
  stats.forEach(function(s) {
    var d = document.createElement('div');
    d.className = 'stat ' + s.cls;
    var n = document.createElement('div');
    n.className = 'number';
    n.textContent = s.num;
    var l = document.createElement('div');
    l.className = 'label';
    l.textContent = s.label;
    d.appendChild(n);
    d.appendChild(l);
    summaryEl.appendChild(d);
  });

  renderPhases();
  renderInfra();
  renderDiscoveries();

  document.getElementById('status-filter').onchange = renderPhases;
  document.getElementById('type-filter').onchange = renderPhases;
  document.getElementById('search').oninput = renderPhases;
}

function createItemRow(item) {
  var row = document.createElement('div');
  row.className = 'item';

  var dot = document.createElement('div');
  dot.className = 'item-status ' + item.status;
  row.appendChild(dot);

  var id = document.createElement('span');
  id.className = 'item-id';
  id.textContent = item.id;
  row.appendChild(id);

  var type = document.createElement('span');
  type.className = 'item-type ' + item.type;
  type.textContent = item.type;
  row.appendChild(type);

  var title = document.createElement('span');
  title.className = 'item-title';
  title.textContent = item.title;
  row.appendChild(title);

  var desc = document.createElement('div');
  desc.className = 'item-desc';
  desc.textContent = item.description;

  row.addEventListener('click', function() {
    row.classList.toggle('expanded');
  });

  return { row: row, desc: desc };
}

function renderPhases() {
  var statusFilter = document.getElementById('status-filter').value;
  var typeFilter = document.getElementById('type-filter').value;
  var search = document.getElementById('search').value.toLowerCase();
  var container = document.getElementById('phases');
  container.textContent = '';

  (data.phases || []).forEach(function(phase) {
    var items = (phase.items || []).filter(function(item) {
      if (statusFilter !== 'all' && item.status.indexOf(statusFilter) === -1) return false;
      if (typeFilter !== 'all' && item.type !== typeFilter) return false;
      if (search && item.title.toLowerCase().indexOf(search) === -1 && item.description.toLowerCase().indexOf(search) === -1 && item.id.toLowerCase().indexOf(search) === -1) return false;
      return true;
    });
    if (items.length === 0 && (statusFilter !== 'all' || typeFilter !== 'all' || search)) return;
    if (items.length === 0) items = phase.items || [];

    var complete = (phase.items || []).filter(function(i) { return i.status === 'complete' || i.status === 'resolved-workaround'; }).length;
    var total = (phase.items || []).length;
    var pct = total > 0 ? Math.round(complete / total * 100) : 0;

    var div = document.createElement('div');
    div.className = 'phase';

    var header = document.createElement('div');
    header.className = 'phase-header';
    header.addEventListener('click', function() { div.classList.toggle('open'); });

    var titleSpan = document.createElement('span');
    titleSpan.className = 'phase-title';
    var numSpan = document.createElement('span');
    numSpan.className = 'num';
    numSpan.textContent = 'Phase ' + phase.phase + ' ';
    titleSpan.appendChild(numSpan);
    titleSpan.appendChild(document.createTextNode(phase.name));
    header.appendChild(titleSpan);

    var meta = document.createElement('div');
    meta.className = 'phase-meta';

    var priority = document.createElement('span');
    priority.className = 'phase-priority ' + phase.priority;
    priority.textContent = phase.priority;
    meta.appendChild(priority);

    var bar = document.createElement('div');
    bar.className = 'progress-bar';
    var fill = document.createElement('div');
    fill.className = 'progress-fill';
    fill.style.width = pct + '%';
    bar.appendChild(fill);
    meta.appendChild(bar);

    var prog = document.createElement('span');
    prog.className = 'phase-progress';
    prog.textContent = complete + '/' + total;
    meta.appendChild(prog);

    header.appendChild(meta);
    div.appendChild(header);

    var itemsDiv = document.createElement('div');
    itemsDiv.className = 'phase-items';

    items.forEach(function(item) {
      var parts = createItemRow(item);
      itemsDiv.appendChild(parts.row);
      itemsDiv.appendChild(parts.desc);
    });

    div.appendChild(itemsDiv);
    container.appendChild(div);
  });
}

function renderInfra() {
  var items = data.infrastructure || [];
  if (items.length === 0) return;
  document.getElementById('infra-title').style.display = 'block';
  var container = document.getElementById('infrastructure');
  container.textContent = '';

  var div = document.createElement('div');
  div.className = 'phase open';
  var itemsDiv = document.createElement('div');
  itemsDiv.className = 'phase-items';
  itemsDiv.style.display = 'block';

  items.forEach(function(item) {
    var parts = createItemRow(item);
    itemsDiv.appendChild(parts.row);
    itemsDiv.appendChild(parts.desc);
  });

  div.appendChild(itemsDiv);
  container.appendChild(div);
}

function renderDiscoveries() {
  var discoveries = data.keyDiscoveries || [];
  if (discoveries.length === 0) return;
  document.getElementById('disc-title').style.display = 'block';
  var container = document.getElementById('discoveries');
  container.textContent = '';
  discoveries.forEach(function(d) {
    var div = document.createElement('div');
    div.className = 'discovery';
    div.textContent = d;
    container.appendChild(div);
  });
}
</script>
</body>
</html>
